   <style>
       * { margin: 0; padding: 0; box-sizing: border-box; }
       :root {
           --bg: #050307;
           --bg2: #0a0710;
           --bg3: #120b1a;
           --accent: #ff2b9e;
           --accent-rgb: 255, 43, 158;
           --accent-dim: rgba(255, 43, 158, 0.12);
           --accent-mid: rgba(255, 43, 158, 0.38);
           --text: #ff7bc0;
           --text-strong: #ffd0e7;
           --text-muted: rgba(255, 123, 192, 0.7);
           --panel: rgba(10, 8, 14, 0.82);
           --panel-2: rgba(15, 11, 20, 0.9);
           --panel-3: rgba(20, 14, 28, 0.94);
           --border: rgba(255, 43, 158, 0.12);
           --border-bright: rgba(255, 43, 158, 0.28);
           --surface: rgba(14, 10, 18, 0.88);
           --shadow: 0 18px 60px rgba(0, 0, 0, 0.45);
           --shadow-strong: 0 24px 80px rgba(0, 0, 0, 0.62);
           --radius: 20px;
           --radius-sm: 14px;
           --accent-glow: 0 0 20px rgba(var(--accent-rgb), 0.32);
           --matrix-fade: rgba(0, 0, 0, 0.08);
       }
       [data-theme="light"] {
           --bg: #f5f1f7;
           --bg2: #ece4ee;
           --bg3: #ffffff;
           --panel: rgba(255, 255, 255, 0.78);
           --panel-2: rgba(255, 255, 255, 0.9);
           --panel-3: rgba(255, 255, 255, 0.96);
           --surface: rgba(255, 255, 255, 0.86);
           --text: #b7176f;
           --text-strong: #7e1149;
           --text-muted: rgba(183, 23, 111, 0.72);
           --border: rgba(183, 23, 111, 0.12);
           --border-bright: rgba(183, 23, 111, 0.22);
           --matrix-fade: rgba(245, 241, 247, 0.16);
           --shadow: 0 16px 50px rgba(78, 35, 58, 0.14);
           --shadow-strong: 0 20px 60px rgba(78, 35, 58, 0.18);
       }
       [data-theme="light"] .vignette { display: none; }
       [data-theme="light"] nav { background: rgba(255,255,255,0.72); }
       html {
           background: var(--bg);
           color-scheme: dark;
       }
       body {
           font-family: 'Space Mono', 'Courier New', monospace;
           min-height: 100vh;
           overflow-x: hidden;
           color: var(--text);
           background:
               radial-gradient(1200px 700px at 50% -10%, rgba(var(--accent-rgb), 0.18), transparent 60%),
               radial-gradient(1000px 700px at 0% 100%, rgba(var(--accent-rgb), 0.08), transparent 55%),
               linear-gradient(180deg, var(--bg2) 0%, var(--bg) 100%);
       }
       body::before {
           content: "";
           position: fixed;
           inset: 0;
           background:
               linear-gradient(135deg, rgba(255,255,255,0.03), transparent 35%),
               radial-gradient(circle at 50% 0%, rgba(255,255,255,0.06), transparent 20%);
           pointer-events: none;
           z-index: 0;
       }

       /* ─── Matrix Canvas ─── */
       #matrixCanvas {
           position: fixed;
           inset: 0;
           width: 100%;
           height: 100%;
           z-index: 0;
           opacity: 0.34;
           pointer-events: none;
       }

       /* ─── Scanlines ─── */
       .scanline {
           position: fixed;
           inset: 0;
           background: repeating-linear-gradient(
               0deg,
               transparent,
               transparent 2px,
               rgba(var(--accent-rgb), 0.014) 2px,
               rgba(var(--accent-rgb), 0.014) 4px
           );
           pointer-events: none;
           z-index: 9999;
           mix-blend-mode: screen;
       }

       /* ─── Vignette ─── */
       .vignette {
           position: fixed;
           inset: 0;
           background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.72) 100%);
           pointer-events: none;
           z-index: 1;
       }

       /* ─── Header ─── */
       header {
           position: relative;
           z-index: 2;
           padding: 2.4rem 1.25rem 1.8rem;
           text-align: center;
           border-bottom: 1px solid var(--border);
           background:
               linear-gradient(180deg, rgba(var(--accent-rgb),0.08), transparent 48%),
               linear-gradient(180deg, var(--panel), transparent);
           backdrop-filter: blur(14px);
           box-shadow: var(--shadow);
       }
       header::after {
           content: '';
           position: absolute;
           left: 10%;
           right: 10%;
           bottom: -1px;
           height: 1px;
           background: linear-gradient(90deg, transparent, var(--accent), transparent);
           box-shadow: 0 0 18px rgba(var(--accent-rgb), 0.7);
       }
       h1 {
           display: inline-flex;
           align-items: center;
           gap: 0.35em;
           font-family: 'Orbitron', monospace;
           font-size: clamp(2.1rem, 8vw, 4.8rem);
           font-weight: 900;
           letter-spacing: 0.28em;
           color: var(--accent);
           text-shadow:
               0 0 10px rgba(var(--accent-rgb), 0.65),
               0 0 28px rgba(var(--accent-rgb), 0.35),
               0 0 70px rgba(var(--accent-rgb), 0.18);
           transition: transform 0.08s ease-out, filter 0.2s ease;
           will-change: transform;
           line-height: 1;
           max-width: 100%;
       }
       #untdocLogo {
           flex-shrink: 0;
       }
       .tagline {
           margin-top: 0.7rem;
           color: var(--text-muted);
           font-size: 0.74rem;
           letter-spacing: 0.32em;
           text-transform: uppercase;
       }

       /* ─── Material Icons ─── */
       .material-symbols-outlined {
           font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 20;
           font-size: 16px;
           vertical-align: middle;
           line-height: 1;
       }

       /* ─── Nav ─── */
       nav {
           position: sticky;
           top: 0;
           z-index: 100;
           display: flex;
           justify-content: center;
           align-items: center;
           gap: 0.4rem;
           flex-wrap: wrap;
           padding: 0.8rem 0.9rem;
           background: rgba(10, 8, 14, 0.72);
           border-bottom: 1px solid var(--border);
           backdrop-filter: blur(18px);
           box-shadow: 0 10px 40px rgba(0,0,0,0.18);
       }
       nav button.nav-btn,
       .control-btn,
       .back-to-mono,
       #easterEggClose,
       .source-filter-label,
       .settings-group,
       #gameSearch,
       #editor {
           font-family: inherit;
       }
       nav button.nav-btn {
           position: relative;
           display: inline-flex;
           align-items: center;
           gap: 0.45rem;
           padding: 0.8rem 1.05rem;
           border: 1px solid transparent;
           border-radius: 999px;
           background: rgba(255,255,255,0.02);
           color: var(--text-muted);
           cursor: pointer;
           font-size: 0.72rem;
           letter-spacing: 0.12em;
           text-transform: uppercase;
           transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease, color 0.18s ease, box-shadow 0.18s ease;
       }
       nav button.nav-btn:hover {
           transform: translateY(-1px);
           color: var(--text-strong);
           border-color: var(--border-bright);
           background: rgba(var(--accent-rgb), 0.08);
           box-shadow: var(--accent-glow);
       }
       nav button.nav-btn.active {
           color: var(--accent);
           background: linear-gradient(180deg, rgba(var(--accent-rgb), 0.14), rgba(var(--accent-rgb), 0.08));
           border-color: rgba(var(--accent-rgb), 0.34);
           box-shadow:
               0 0 0 1px rgba(var(--accent-rgb), 0.08) inset,
               0 12px 28px rgba(0,0,0,0.12),
               var(--accent-glow);
           text-shadow: 0 0 8px rgba(var(--accent-rgb), 0.45);
       }
       nav button.nav-btn.active::after {
           content: '';
           position: absolute;
           left: 18%;
           right: 18%;
           bottom: -12px;
           height: 2px;
           border-radius: 999px;
           background: var(--accent);
           box-shadow: 0 0 12px rgba(var(--accent-rgb), 0.8);
       }

       /* ─── Random Game Button ─── */
       nav button.random-game-btn {
           position: relative;
           display: inline-flex;
           align-items: center;
           gap: 0.45rem;
           padding: 0.8rem 1.2rem;
           border: 1px solid rgba(var(--accent-rgb), 0.5);
           border-radius: 999px;
           background: linear-gradient(135deg, rgba(var(--accent-rgb), 0.18), rgba(var(--accent-rgb), 0.08));
           color: var(--accent);
           cursor: pointer;
           font-family: inherit;
           font-size: 0.72rem;
           letter-spacing: 0.14em;
           text-transform: uppercase;
           font-weight: 700;
           box-shadow:
               0 0 0 1px rgba(var(--accent-rgb), 0.1) inset,
               0 0 24px rgba(var(--accent-rgb), 0.18),
               var(--accent-glow);
           text-shadow: 0 0 10px rgba(var(--accent-rgb), 0.55);
           transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
           animation: randomBtnPulse 2.8s ease-in-out infinite;
       }
       nav button.random-game-btn:hover {
           transform: translateY(-2px) scale(1.04);
           background: linear-gradient(135deg, rgba(var(--accent-rgb), 0.28), rgba(var(--accent-rgb), 0.14));
           border-color: rgba(var(--accent-rgb), 0.75);
           box-shadow:
               0 0 0 1px rgba(var(--accent-rgb), 0.18) inset,
               0 0 38px rgba(var(--accent-rgb), 0.32),
               0 8px 28px rgba(0,0,0,0.22),
               var(--accent-glow);
           animation: none;
       }
       nav button.random-game-btn:active {
           transform: translateY(0px) scale(0.97);
       }
       nav button.random-game-btn.spinning .random-dice-icon {
           animation: diceSpin 0.55s cubic-bezier(0.4,0,0.2,1);
       }
       @keyframes randomBtnPulse {
           0%, 100% { box-shadow: 0 0 0 1px rgba(var(--accent-rgb), 0.1) inset, 0 0 24px rgba(var(--accent-rgb), 0.18), var(--accent-glow); }
           50%       { box-shadow: 0 0 0 1px rgba(var(--accent-rgb), 0.16) inset, 0 0 38px rgba(var(--accent-rgb), 0.3),  var(--accent-glow); }
       }
       @keyframes diceSpin {
           0%   { transform: rotate(0deg) scale(1); }
           35%  { transform: rotate(180deg) scale(1.3); }
           70%  { transform: rotate(300deg) scale(0.9); }
           100% { transform: rotate(360deg) scale(1); }
       }
       .random-dice-icon {
           display: inline-flex;
           align-items: center;
           font-size: 17px;
       }

       /* ─── Container ─── */
       .container {
           position: relative;
           z-index: 2;
           width: min(1520px, calc(100% - 1rem));
           margin: 0 auto;
           padding: 1.25rem 0 2rem;
       }

       /* ─── Tabs ─── */
       .tabs-wrapper { position: relative; }
       .tab-content {
           position: absolute;
           top: 0;
           left: 0;
           width: 100%;
           opacity: 0;
           visibility: hidden;
           pointer-events: none;
           transform: translateY(8px);
           transition: opacity 0.26s ease, visibility 0.26s ease, transform 0.26s ease;
       }
       .tab-content.active {
           position: relative;
           opacity: 1;
           visibility: visible;
           pointer-events: auto;
           transform: translateY(0);
       }

       /* ─── Search ─── */
       .search-wrapper {
           display: flex;
           flex-direction: column;
           align-items: center;
           gap: 0.8rem;
           margin-bottom: 1.35rem;
           padding: 1rem;
           border: 1px solid var(--border);
           border-radius: var(--radius);
           background: linear-gradient(180deg, rgba(var(--accent-rgb), 0.04), transparent 70%), var(--panel);
           backdrop-filter: blur(14px);
           box-shadow: var(--shadow);
       }
       .search-inner {
           width: 100%;
           max-width: 760px;
           position: relative;
           display: flex;
           align-items: center;
       }
       .search-icon {
           position: absolute;
           left: 16px;
           color: var(--text-muted);
           font-size: 18px;
           pointer-events: none;
           line-height: 1;
       }
       #gameSearch {
           width: 100%;
           padding: 0.95rem 1rem 0.95rem 2.8rem;
           border: 1px solid var(--border-bright);
           border-radius: 16px;
           outline: none;
           background: var(--panel-2);
           color: var(--text-strong);
           font-size: 0.92rem;
           letter-spacing: 0.04em;
           transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease, transform 0.2s ease;
       }
       #gameSearch::placeholder { color: var(--text-muted); }
       #gameSearch:hover {
           border-color: rgba(var(--accent-rgb), 0.22);
       }
       #gameSearch:focus {
           border-color: rgba(var(--accent-rgb), 0.7);
           background: var(--panel-3);
           box-shadow:
               0 0 0 1px rgba(var(--accent-rgb), 0.3),
               0 0 34px rgba(var(--accent-rgb), 0.15),
               inset 0 0 0 1px rgba(255,255,255,0.04);
           animation: searchPulse 2.5s ease-in-out infinite;
       }
       @keyframes searchPulse {
           0%, 100% { box-shadow: 0 0 0 1px rgba(var(--accent-rgb), 0.3), 0 0 34px rgba(var(--accent-rgb), 0.15); }
           50% { box-shadow: 0 0 0 1px rgba(var(--accent-rgb), 0.35), 0 0 46px rgba(var(--accent-rgb), 0.22); }
       }
       .search-count {
           font-size: 0.72rem;
           color: var(--text-muted);
           letter-spacing: 0.16em;
           text-transform: uppercase;
       }

       /* ─── Games Grid ─── */
       .games-grid {
           display: grid;
           grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
           gap: 0.65rem;
       }
       #gameGrid,
       #pinnedGrid {
           position: relative;
           z-index: 4;
       }
       .game-card {
           position: relative;
           overflow: hidden;
           display: flex;
           align-items: center;
           gap: 0.75rem;
           min-height: 56px;
           padding: 0.9rem 1rem;
           border: 1px solid var(--border);
           border-left: 3px solid transparent;
           border-radius: 16px;
           cursor: pointer;
           background:
               linear-gradient(180deg, rgba(255,255,255,0.03), transparent 35%),
               var(--panel-2);
           box-shadow: 0 8px 26px rgba(0,0,0,0.12);
           transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
       }
       .game-card::before {
           content: '';
           position: absolute;
           inset: 0;
           background: linear-gradient(135deg, rgba(var(--accent-rgb), 0.08), transparent 55%);
           opacity: 0;
           transition: opacity 0.18s ease;
       }
       .game-card::after {
           content: '';
           position: absolute;
           top: 0;
           right: 0;
           width: 0;
           height: 0;
           border-style: solid;
           border-width: 0 16px 16px 0;
           border-color: transparent rgba(255,255,255,0.08) transparent transparent;
           transition: border-color 0.18s ease;
       }
       .game-card:hover {
           transform: translateY(-2px);
           border-color: rgba(var(--accent-rgb), 0.35);
           border-left-color: var(--accent);
           background: linear-gradient(180deg, rgba(var(--accent-rgb), 0.08), rgba(255,255,255,0.02)), var(--panel-3);
           box-shadow:
               0 16px 36px rgba(0,0,0,0.22),
               0 0 0 1px rgba(var(--accent-rgb), 0.08) inset,
               0 0 24px rgba(var(--accent-rgb), 0.12);
           z-index: 10;
       }
       .game-card:hover::before { opacity: 1; }
       .game-card:hover::after {
           border-color: transparent var(--accent) transparent transparent;
       }
       .game-card-title-container {
           display: flex;
           align-items: center;
           justify-content: space-between;
           gap: 0.75rem;
           width: 100%;
           min-width: 0;
       }
       .game-card h3 {
           min-width: 0;
           color: var(--text-strong);
           font-size: 0.8rem;
           font-weight: 400;
           letter-spacing: 0.03em;
           white-space: nowrap;
           overflow: hidden;
           text-overflow: ellipsis;
           transition: color 0.15s ease, opacity 0.15s ease;
           opacity: 0.92;
       }
       .game-card:hover h3 {
           color: var(--accent);
           opacity: 1;
       }

       /* ─── Letter Section Headers ─── */
       .letter-section {
           grid-column: 1 / -1;
           display: flex;
           align-items: center;
           gap: 0.9rem;
           padding: 1rem 0 0.35rem;
           margin-top: 0.15rem;
       }
       .letter-section:first-child { padding-top: 0.25rem; margin-top: 0; }
       .letter-label {
           flex-shrink: 0;
           display: inline-flex;
           align-items: center;
           justify-content: center;
           min-width: 3rem;
           padding: 0.35rem 0.8rem;
           border-radius: 999px;
           border: 1px solid rgba(var(--accent-rgb), 0.35);
           background: rgba(var(--accent-rgb), 0.12);
           color: var(--accent);
           font-family: 'Orbitron', monospace;
           font-size: 1rem;
           font-weight: 900;
           letter-spacing: 0.22em;
           text-shadow: 0 0 10px rgba(var(--accent-rgb), 0.5);
           box-shadow: 0 0 22px rgba(var(--accent-rgb), 0.12);
       }
       .letter-divider {
           flex: 1;
           height: 1px;
           background: linear-gradient(90deg, rgba(var(--accent-rgb), 0.38), transparent);
           box-shadow: 0 0 10px rgba(var(--accent-rgb), 0.18);
       }

       /* ─── Game Count ─── */
       #gameCount {
           display: inline-flex;
           align-items: center;
           justify-content: center;
           gap: 0.35rem;
           padding: 0.45rem 0.75rem;
           border-radius: 999px;
           border: 1px solid var(--border);
           background: rgba(255,255,255,0.03);
           color: var(--text-muted);
           font-size: 0.68rem;
           letter-spacing: 0.22em;
           text-transform: uppercase;
       }

       /* ─── Pin Icon ─── */
       .pin-icon {
           flex-shrink: 0;
           display: flex;
           align-items: center;
           justify-content: center;
           padding: 0.25rem;
           border-radius: 8px;
           opacity: 0.4;
           cursor: pointer;
           transition: transform 0.15s ease, opacity 0.15s ease, background 0.15s ease;
       }
       .game-card:hover .pin-icon { opacity: 0.68; }
       .pin-icon:hover {
           opacity: 1 !important;
           transform: scale(1.05);
           background: rgba(var(--accent-rgb), 0.12);
       }
       .pin-icon svg {
           display: block;
           width: 15px;
           height: 15px;
           fill: var(--text-strong);
           transition: fill 0.15s ease, filter 0.15s ease;
       }
       .pin-icon:hover svg { filter: drop-shadow(0 0 4px var(--accent)); }
       .pin-icon.pinned {
           opacity: 1;
       }
       .pin-icon.pinned svg {
           fill: var(--accent);
           filter: drop-shadow(0 0 6px rgba(var(--accent-rgb), 0.65));
       }

       /* ─── Pinned empty state ─── */
       .pinned-empty-message {
           display: grid;
           place-items: center;
           text-align: center;
           gap: 0.4rem;
           padding: 4rem 1rem;
           margin-bottom: 0.75rem;
           border: 1px dashed var(--border-bright);
           border-radius: var(--radius);
           background: var(--panel);
           color: var(--text-muted);
           box-shadow: var(--shadow);
       }
       .pinned-empty-message .pin-icon-large {
           display: block;
           margin-bottom: 0.5rem;
           opacity: 0.35;
       }
       .pinned-empty-message .pin-icon-large svg {
           width: 48px;
           height: 48px;
           fill: var(--text);
       }

       /* ─── Compiler ─── */
       .compiler-container {
           display: flex;
           flex-direction: column;
           gap: 0.9rem;
           padding: 1rem;
           border-radius: var(--radius);
           border: 1px solid var(--border);
           background: linear-gradient(180deg, rgba(var(--accent-rgb), 0.04), transparent 55%), var(--panel);
           box-shadow: var(--shadow);
           backdrop-filter: blur(14px);
       }
       #editor {
           width: 100%;
           min-height: 460px;
           padding: 1rem;
           border-radius: 16px;
           border: 1px solid var(--border-bright);
           border-left: 3px solid rgba(var(--accent-rgb), 0.65);
           outline: none;
           resize: vertical;
           background: var(--panel-3);
           color: var(--text-strong);
           font-size: 0.84rem;
           line-height: 1.7;
           letter-spacing: 0.03em;
           box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02);
           transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
       }
       #editor::placeholder { color: var(--text-muted); opacity: 0.65; }
       #editor:focus {
           border-color: rgba(var(--accent-rgb), 0.74);
           box-shadow:
               0 0 0 1px rgba(var(--accent-rgb), 0.24),
               0 0 26px rgba(var(--accent-rgb), 0.12),
               inset 0 0 0 1px rgba(255,255,255,0.02);
       }
       .controls {
           display: flex;
           flex-wrap: wrap;
           gap: 0.65rem;
       }
       .control-btn {
           display: inline-flex;
           align-items: center;
           gap: 0.45rem;
           padding: 0.8rem 1rem;
           border-radius: 999px;
           border: 1px solid var(--border-bright);
           background: rgba(255,255,255,0.03);
           color: var(--text-muted);
           cursor: pointer;
           font-size: 0.72rem;
           letter-spacing: 0.12em;
           text-transform: uppercase;
           transition: transform 0.18s ease, color 0.18s ease, background 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
       }
       .control-btn:hover {
           transform: translateY(-1px);
           border-color: rgba(var(--accent-rgb), 0.36);
           color: var(--accent);
           background: rgba(var(--accent-rgb), 0.09);
           box-shadow: 0 0 18px rgba(var(--accent-rgb), 0.12);
       }
       .control-btn .material-symbols-outlined { font-size: 15px; }
       #fileInput { display: none; }

       /* ─── Back button ─── */
       .back-to-mono {
           position: fixed;
           top: 18px;
           left: 18px;
           z-index: 200;
           display: inline-flex;
           align-items: center;
           gap: 0.45rem;
           padding: 0.7rem 0.95rem;
           border-radius: 999px;
           border: 1px solid var(--border-bright);
           background: rgba(10, 8, 14, 0.7);
           color: var(--text-muted);
           cursor: pointer;
           letter-spacing: 0.1em;
           font-size: 0.72rem;
           text-transform: uppercase;
           backdrop-filter: blur(16px);
           transition: transform 0.18s ease, color 0.18s ease, border-color 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
       }
       .back-to-mono:hover {
           transform: translateY(-1px);
           border-color: rgba(var(--accent-rgb), 0.38);
           color: var(--accent);
           background: rgba(var(--accent-rgb), 0.1);
           box-shadow: 0 0 16px rgba(var(--accent-rgb), 0.12);
       }

       /* ─── Settings panel ─── */
       .settings-container {
           position: fixed;
           top: 18px;
           right: 18px;
           z-index: 200;
           display: flex;
           flex-direction: column;
           gap: 0.55rem;
       }
       .settings-group {
           display: flex;
           align-items: center;
           gap: 0.7rem;
           padding: 0.6rem 0.8rem;
           border-radius: 999px;
           border: 1px solid var(--border-bright);
           background: rgba(10, 8, 14, 0.72);
           backdrop-filter: blur(16px);
           box-shadow: 0 8px 24px rgba(0,0,0,0.14);
       }
       .settings-group label {
           color: var(--text-muted);
           font-size: 0.68rem;
           letter-spacing: 0.14em;
           text-transform: uppercase;
           cursor: pointer;
       }
       #accentColorPicker {
           -webkit-appearance: none;
           appearance: none;
           width: 28px;
           height: 28px;
           border: 1px solid rgba(var(--accent-rgb), 0.35);
           border-radius: 50%;
           cursor: pointer;
           overflow: hidden;
           background: none;
       }
       #accentColorPicker::-webkit-color-swatch-wrapper { padding: 0; }
       #accentColorPicker::-webkit-color-swatch { border: none; border-radius: 50%; }

       .toggle-switch {
           position: relative;
           width: 40px;
           height: 20px;
       }
       .toggle-switch input {
           opacity: 0;
           width: 0;
           height: 0;
       }
       .toggle-slider {
           position: absolute;
           inset: 0;
           cursor: pointer;
           border-radius: 999px;
           background: var(--border);
           transition: background 0.22s ease, box-shadow 0.22s ease;
       }
       .toggle-slider::before {
           content: "";
           position: absolute;
           left: 3px;
           bottom: 3px;
           width: 14px;
           height: 14px;
           border-radius: 50%;
           background: rgba(255,255,255,0.68);
           transition: transform 0.22s ease, background 0.22s ease;
       }
       .toggle-switch input:checked + .toggle-slider {
           background: rgba(var(--accent-rgb), 0.34);
           box-shadow: 0 0 12px rgba(var(--accent-rgb), 0.2);
       }
       .toggle-switch input:checked + .toggle-slider::before {
           transform: translateX(20px);
           background: var(--accent);
       }

       /* ─── Loader overlay ─── */
       #loader {
           display: none;
           position: fixed;
           bottom: 20px;
           right: 20px;
           z-index: 10000;
           align-items: center;
           gap: 0.65rem;
           padding: 0.85rem 1rem;
           border-radius: 14px;
           border: 1px solid var(--border-bright);
           border-left: 3px solid var(--accent);
           background: rgba(10, 8, 14, 0.88);
           color: var(--text-muted);
           box-shadow: var(--shadow-strong);
           backdrop-filter: blur(16px);
           font-size: 0.78rem;
           letter-spacing: 0.16em;
           text-transform: uppercase;
       }
       #loader.active { display: flex; }
       .loader-spinner {
           width: 16px;
           height: 16px;
           flex-shrink: 0;
           border: 2px solid var(--border-bright);
           border-top-color: var(--accent);
           border-radius: 50%;
           animation: spin 0.7s linear infinite;
       }
       @keyframes spin { to { transform: rotate(360deg); } }

       /* ─── load trigger ─── */
       .load-trigger { height: 24px; width: 100%; }

       /* ─── No Animations Mode ─── */
       .no-animations * { animation: none !important; transition: none !important; }
       .no-animations .scanline { display: none !important; }
       .no-animations #matrixCanvas { display: none !important; }
       .no-animations h1 { text-shadow: 0 0 10px rgba(var(--accent-rgb), 0.8) !important; filter: none !important; transform: none !important; }
       .no-animations .game-card:hover { transform: none !important; }
       .no-animations #gameSearch:focus { animation: none !important; }

       /* ─── Easter Egg Popup ─── */
       #easterEggOverlay {
           display: none;
           position: fixed;
           inset: 0;
           z-index: 99999;
           background: rgba(0, 0, 0, 0.76);
           align-items: center;
           justify-content: center;
           backdrop-filter: blur(8px);
           padding: 1rem;
       }
       #easterEggOverlay.show { display: flex; }
       #easterEggBox {
           position: relative;
           width: min(92vw, 480px);
           padding: 2rem 1.5rem 1.6rem;
           text-align: center;
           border-radius: 24px;
           border: 1px solid rgba(var(--accent-rgb), 0.55);
           background: linear-gradient(180deg, rgba(var(--accent-rgb), 0.05), transparent 30%), var(--panel-2);
           box-shadow:
               0 0 40px rgba(var(--accent-rgb), 0.28),
               0 0 80px rgba(var(--accent-rgb), 0.12),
               inset 0 0 30px rgba(var(--accent-rgb), 0.04);
           animation: eggPop 0.25s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
       }
       @keyframes eggPop {
           from { transform: scale(0.72); opacity: 0; }
           to { transform: scale(1); opacity: 1; }
       }
       #easterEggBox .egg-label {
           margin-bottom: 0.95rem;
           color: var(--text-muted);
           font-size: 0.64rem;
           letter-spacing: 0.32em;
           text-transform: uppercase;
       }
       #easterEggBox .egg-text {
           margin-bottom: 1.5rem;
           color: var(--accent);
           font-family: 'Orbitron', monospace;
           font-size: clamp(1rem, 4vw, 1.5rem);
           font-weight: 900;
           line-height: 1.3;
           letter-spacing: 0.08em;
           text-shadow: 0 0 10px rgba(var(--accent-rgb), 0.65), 0 0 30px rgba(var(--accent-rgb), 0.35);
       }
       #easterEggBox img {
           width: min(100%, 260px);
           display: block;
           margin: 0 auto 1.25rem;
           border-radius: 18px;
           border: 1px solid rgba(var(--accent-rgb), 0.28);
           box-shadow: 0 0 20px rgba(var(--accent-rgb), 0.2);
       }
       #easterEggClose {
           display: inline-flex;
           align-items: center;
           justify-content: center;
           padding: 0.75rem 1.5rem;
           border-radius: 999px;
           border: 1px solid rgba(var(--accent-rgb), 0.4);
           background: rgba(255,255,255,0.02);
           color: var(--text-muted);
           cursor: pointer;
           font-size: 0.74rem;
           letter-spacing: 0.16em;
           text-transform: uppercase;
           transition: transform 0.18s ease, color 0.18s ease, border-color 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
       }
       #easterEggClose:hover {
           transform: translateY(-1px);
           border-color: rgba(var(--accent-rgb), 0.65);
           color: var(--accent);
           background: rgba(var(--accent-rgb), 0.12);
           box-shadow: 0 0 18px rgba(var(--accent-rgb), 0.16);
       }

       /* ─── Source Filters ─── */
       .source-filters {
           display: flex;
           flex-wrap: wrap;
           justify-content: center;
           gap: 0.65rem;
       }
       .source-filter-label {
           display: inline-flex;
           align-items: center;
           gap: 0.45rem;
           padding: 0.55rem 0.85rem;
           border-radius: 999px;
           border: 1px solid var(--border);
           background: rgba(255,255,255,0.03);
           cursor: pointer;
           user-select: none;
           color: var(--text-muted);
           font-size: 0.68rem;
           letter-spacing: 0.12em;
           text-transform: uppercase;
           transition: transform 0.18s ease, color 0.18s ease, border-color 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
       }
       .source-filter-label:hover {
           transform: translateY(-1px);
           color: var(--text-strong);
           border-color: var(--border-bright);
           background: rgba(var(--accent-rgb), 0.08);
       }
       .source-filter-label input[type="checkbox"] {
           appearance: none;
           -webkit-appearance: none;
           width: 12px;
           height: 12px;
           border: 1px solid rgba(var(--accent-rgb), 0.5);
           border-radius: 3px;
           position: relative;
           cursor: pointer;
           flex-shrink: 0;

   // OPTIMIZATION: Pause matrix when tab is hidden to save RAM/CPU
   function drawMatrix() {
       if (document.hidden || document.body.classList.contains('no-animations')) return;

       ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
       ctx.fillRect(0, 0, canvas.width, canvas.height);

       ctx.fillStyle = cachedAccentColor;
       ctx.font = fontSize + 'px Courier New';

       for (let i = 0; i < drops.length; i++) {
           const text = chars[Math.floor(Math.random() * chars.length)];
           ctx.fillText(text, i * fontSize, drops[i] * fontSize);

           if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
               drops[i] = 0;
           }
           drops[i]++;
       }
   }

   // Precompute letter, sort key, and lowercase name on every game once at startup
   for (let i = 0; i < allGames.length; i++) {
       const g = allGames[i];
       const c = g.name.charAt(0);
       g._letter = /[A-Za-z]/.test(c) ? c.toUpperCase() : (/[0-9]/.test(c) ? '#' : '%');
       g._sortKey = g._letter === '%' ? '0' : g._letter === '#' ? '1' : '2' + g._letter;
       g._nameLower = g.name.toLowerCase();
   }

   // Sort once by sort-key + name — renderNextChunk never needs to sort again
   allGames.sort((a, b) => {
       if (a._sortKey !== b._sortKey) return a._sortKey < b._sortKey ? -1 : 1;
       return a.name.localeCompare(b.name, undefined, { numeric: true, sensitivity: 'base' });
   });

   // Pinned games as a Set — O(1) lookup vs O(n) array.includes + JSON.parse per card
   let pinnedSet = new Set();
   try { pinnedSet = new Set(JSON.parse(localStorage.getItem(PINNED_GAMES_STORAGE_KEY) || '[]')); } catch(e) {}

   function savePinnedGames() {

   function createGameCard(game) {
       const card = document.createElement('div');
       card.className = 'game-card';
       const isPinned = pinnedSet.has(game.name);
       const container = document.createElement('div');
       container.className = 'game-card-title-container';

       pinBtn.onclick = (e) => { e.stopPropagation(); togglePin(game.name); };

   // Chunk rendering — renders 80 cards at a time, IntersectionObserver loads more on scroll
   const CHUNK_SIZE = 80;
   let currentFilteredGames = [];
   let renderOffset = 0;
   let lastRenderedLetter = null;

   function renderNextChunk() {
       const end = Math.min(renderOffset + CHUNK_SIZE, currentFilteredGames.length);
       if (renderOffset >= currentFilteredGames.length) {
           gamesLoadTrigger.style.display = 'none';
           return;
       }
       const fragment = document.createDocumentFragment();
       for (let i = renderOffset; i < end; i++) {
           const game = currentFilteredGames[i];
           if (game._letter !== lastRenderedLetter) {
               lastRenderedLetter = game._letter;
               const section = document.createElement('div');
               section.className = 'letter-section';
               const label = document.createElement('span');
               label.className = 'letter-label';
               label.textContent = game._letter;
               const divider = document.createElement('div');
               divider.className = 'letter-divider';
               section.appendChild(label);
               section.appendChild(divider);
               fragment.appendChild(section);
           }
           fragment.appendChild(createGameCard(game));
       }
       grid.appendChild(fragment);
       renderOffset = end;
       gamesLoadTrigger.style.display = renderOffset < currentFilteredGames.length ? 'block' : 'none';
   }

   // Trigger next chunk whenever the load sentinel scrolls into view
   new IntersectionObserver(entries => {
       if (entries[0].isIntersecting) renderNextChunk();
   }, { rootMargin: '300px' }).observe(gamesLoadTrigger);

   // Single-pass filter — one loop handles pinned, unpinned, source filter, search, and count
   function renderAllGames() {
       const query = gameSearch.value.toLowerCase();
       const ralphOn = filterRalph.checked;
       const onefileOn = filterOnefile.checked;
       const seraphOn = filterSeraph ? filterSeraph.checked : true;
       const pinnedArr = [];
       const unpinnedArr = [];
       let sourceTotal = 0;

       for (let i = 0; i < allGames.length; i++) {
           const g = allGames[i];
           let show;
           if (g.baseUrl === BASE_URL) show = ralphOn;
           else if (g.baseUrl === onefileBaseUrl) show = onefileOn;
           else if (g.baseUrl === seraphBaseUrl) show = seraphOn;
           else show = true;
           if (!show) continue;
           const isPinned = pinnedSet.has(g.name);
           if (!isPinned) sourceTotal++;
           if (query && !g._nameLower.includes(query)) continue;
           if (isPinned) pinnedArr.push(g);
           else unpinnedArr.push(g);
       }

       if (gameCountEl) {
           gameCountEl.textContent = query
               ? `[ ${unpinnedArr.length} / ${sourceTotal} games ]`
               : `[ ${sourceTotal} games ]`;
       }

       pinnedGrid.innerHTML = '';
       if (pinnedArr.length > 0) {
           const frag = document.createDocumentFragment();
           for (let i = 0; i < pinnedArr.length; i++) frag.appendChild(createGameCard(pinnedArr[i]));
           pinnedGrid.appendChild(frag);
           pinnedEmptyMessage.style.display = 'none';
           pinnedGrid.style.display = 'flex';
       } else {
           pinnedEmptyMessage.style.display = 'block';
           pinnedGrid.style.display = 'none';
       }

       currentFilteredGames = unpinnedArr;
       renderOffset = 0;
       lastRenderedLetter = null;
       grid.innerHTML = '';
       renderNextChunk();
   }

   renderAllGames();

   let searchTimeout;
   function filterGames() {
       clearTimeout(searchTimeout);
       searchTimeout = setTimeout(renderAllGames, 180);

async function launchGame(fileName, baseUrl, isPNG, gameName) {
    document.getElementById('loader').classList.add('active');
    const frame = document.getElementById('gameFrame');
    openGame(gameName || fileName);

    if (isPNG) {
        const fullUrl = baseUrl + fileName;

        frame.contentDocument.write(imageHTML);
        frame.contentDocument.close();

    } else {
        try {
            const fullUrl = baseUrl + fileName;
            const response = await proxiedFetch(fullUrl);
            if (!response.ok) throw new Error('HTTP ' + response.status);
            let html = await response.text();

            const baseHref = fullUrl.substring(0, fullUrl.lastIndexOf('/') + 1);

            let rootHref;
            if (baseUrl === seraphBaseUrl) {
                rootHref = SERAPH_ROOT;
            } else {
                try { rootHref = new URL('/', new URL(baseUrl).origin).href; } catch(e) { rootHref = baseHref; }
            }

            html = html.replace(/((?:src|href|action|data-src)=")\/(?!\/)/gi, '$1' + rootHref);
            html = html.replace(/(url\(['"]?)\/(?!\/)/gi, '$1' + rootHref);

            const baseTag = '<base href="' + baseHref + '">';

            const consoleInject = '<script>' +
            '(function(){' +
            'var lg=parent.addLog;' +
            'if(!lg)return;' +
            'var c=["log","error","warn","info","debug","table","trace","dir","clear"];' +
            'c.forEach(function(m){var o=console[m];console[m]=function(){lg.call(null,Array.from(arguments).join(" "),m);o.apply(console,arguments)}});' +
            'window.onerror=function(m,u,l,c){lg("Error: "+m+" ("+u+":"+l+":"+c+")","error");return false};' +
            'window.onunhandledrejection=function(e){lg("Unhandled Rejection: "+e.reason,"error")};' +
            'var xo=XMLHttpRequest.prototype.open,xs=XMLHttpRequest.prototype.send;' +
            'XMLHttpRequest.prototype.open=function(m,u){this._u=u;this._m=m;return xo.apply(this,arguments)};' +
            'XMLHttpRequest.prototype.send=function(b){var t=this;this.addEventListener("loadend",function(){lg(t._m+" "+t._u+" "+t.status,"network")});return xs.apply(this,arguments)};' +
            'var ff=window.fetch;window.fetch=function(i,init){' +
            'var u=typeof i==="string"?i:(i.url||"");' +
            'var m=(init&&init.method)||"GET";' +
            'return ff.apply(this,arguments).then(function(r){lg(m+" "+u+" "+r.status,"network");return r})["catch"](function(e){lg(m+" "+u+" FAILED: "+e.message,"error");throw e})};' +
            '})();' +
            '<\/script>';

            const urlPatch = '<script>' +
            '(function(){' +
            'var _b=' + JSON.stringify(baseHref) + ';' +
            'var _r=' + JSON.stringify(rootHref) + ';' +
            'function _u(url){' +
            'if(typeof url!=="string")return url;' +
            'if(url.startsWith("http://")||url.startsWith("https://")||url.startsWith("//")||url.startsWith("data:")||url.startsWith("blob:"))return url;' +
            'if(url.startsWith("/"))return _r+url.slice(1);' +
            'try{return new URL(url,_b).href}catch(e){return url}' +
            '}' +
            'var _f=window.fetch;window.fetch=function(i,init){' +
            'if(typeof i==="string")i=_u(i);' +
            'else if(i instanceof Request){var r=_u(i.url);if(r!==i.url)i=new Request(r,i)}' +
            'return _f.call(this,i,init)};' +
            'var _o=XMLHttpRequest.prototype.open;' +
            'XMLHttpRequest.prototype.open=function(m,u,a,u2,p){return _o.call(this,m,_u(u),a!==undefined?a:true,u2,p)};' +
            '})();' +
            '<\/script>';

            const patchScript = urlPatch + consoleInject;

            if (!/<base[\s>]/i.test(html)) {
                if (/<head[\s>]/i.test(html)) {
                    html = html.replace(/(<head[^>]*>)/i, '$1' + baseTag + patchScript);
                } else {
                    html = baseTag + patchScript + html;
                }
            } else {
                if (/<head[\s>]/i.test(html)) {
                    html = html.replace(/(<head[^>]*>)/i, '$1' + patchScript);
                } else {
                    html = patchScript + html;

   // ─── Random Game ───
   // Uses crypto.getRandomValues() + rejection sampling for provably equal probability
   function cryptoRandInt(max) {
       const arr = new Uint32Array(1);
       const limit = Math.floor(0x100000000 / max) * max;
       let val;
       do {
           crypto.getRandomValues(arr);
           val = arr[0];
       } while (val >= limit);
       return val % max;
   }

   function launchRandomGame() {
       const btn = document.getElementById('randomGameBtn');
       const pools = [];
       if (filterRalph.checked) {
           const ralphPool = allGames.filter(g => g.baseUrl === BASE_URL);
           if (ralphPool.length) pools.push(ralphPool);
       }
       if (filterOnefile.checked) {
           const onefilePool = allGames.filter(g => g.baseUrl === onefileBaseUrl);
           if (onefilePool.length) pools.push(onefilePool);
       }
       if (filterSeraph && filterSeraph.checked) {
           const seraphPool = allGames.filter(g => g.baseUrl === seraphBaseUrl);
           if (seraphPool.length) pools.push(seraphPool);
       }
       const otherPool = allGames.filter(g => g.baseUrl !== BASE_URL && g.baseUrl !== onefileBaseUrl && g.baseUrl !== seraphBaseUrl);
       if (otherPool.length) pools.push(otherPool);

       if (pools.length === 0) return;

       if (btn) {
           btn.classList.add('spinning');
           setTimeout(() => btn.classList.remove('spinning'), 560);
       }

       const poolIdx = cryptoRandInt(pools.length);
       const chosenPool = pools[poolIdx];
       const chosen = chosenPool[cryptoRandInt(chosenPool.length)];
       console.log('[RANDOM] picked', chosen.name, chosen.baseUrl, 'pool', poolIdx, 'size', chosenPool.length);
       launchGame(chosen.file, chosen.baseUrl, chosen.isPNG, chosen.name);
   }

   function hexToRgb(hex) {
       const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
       return result ? `${parseInt(result[1], 16)}, ${parseInt(result[2], 16)}, ${parseInt(result[3], 16)}` : '255, 43, 158';
   }

   function lightenColor(hex, amount) {
       const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
       if (!result) return '#ffd0e7';
       const r = parseInt(result[1], 16);
       const g = parseInt(result[2], 16);
       const b = parseInt(result[3], 16);
       return `rgb(${Math.round(r + (255-r)*amount)}, ${Math.round(g + (255-g)*amount)}, ${Math.round(b + (255-b)*amount)})`;
   }

   function saveAccentColor(color) {
       localStorage.setItem(STORAGE_KEY, color);
   }

   function handleColorChange(event) {
       const newColor = event.target.value;
       applyAccentColor(newColor);
       saveAccentColor(newColor);
   }

   loadAccentColor();
   colorPicker.addEventListener('input', handleColorChange);
   colorPicker.addEventListener('change', handleColorChange);

   // Animations Toggle
   const animationsToggle = document.getElementById('animationsToggle');
   const animationsStorageKey = 'untdoc_animations_enabled';

   function loadAnimationsSetting() {
       const savedSetting = localStorage.getItem(animationsStorageKey);
       if (savedSetting !== null) {
           animationsToggle.checked = savedSetting === 'true';
           if (!animationsToggle.checked) {
               disableAllAnimations();
           }
       }
   }

   function toggleAnimations() {
       if (animationsToggle.checked) {
           enableAllAnimations();
       } else {
           disableAllAnimations();
       }
       localStorage.setItem(animationsStorageKey, animationsToggle.checked);
   }

   function disableAllAnimations() {
       document.body.classList.add('no-animations');
       if (flickerInterval) {
           clearInterval(flickerInterval);
           flickerInterval = null;
       }
       title.style.filter = 'none';
   }

   function enableAllAnimations() {
       document.body.classList.remove('no-animations');
       if (!flickerInterval) flickerInterval = setInterval(flickerLogo, 100);
   }

    animationsToggle.addEventListener('change', toggleAnimations);
    loadAnimationsSetting();

    // ─── Console ───
    const consoleLogs = [];
    let consoleFilter = 'all';
    let consoleOpen = false;

    function getConsoleEl(id) {
        return document.getElementById(id);
    }

    function toggleConsole() {
        consoleOpen = !consoleOpen;
        var overlay = getConsoleEl('consoleOverlay');
        var panel = getConsoleEl('consolePanel');
        if (overlay) overlay.classList.toggle('active', consoleOpen);
        if (panel) panel.classList.toggle('active', consoleOpen);
        if (consoleOpen) {
            var input = getConsoleEl('consoleInput');
            if (input) setTimeout(function(){ input.focus(); }, 100);
        }
    }

    function addLog(message, type) {
        type = type || 'info';
        var entry = {
            id: Date.now() + Math.random(),
            message: String(message),
            type: type,
            time: new Date()
        };
        consoleLogs.unshift(entry);
        if (consoleLogs.length > 500) consoleLogs.pop();
        renderLogs();
    }

    function escapeHtml(text) {
        var d = document.createElement('div');
        d.textContent = text;
        return d.innerHTML;
    }

    function renderLogs() {
        var body = getConsoleEl('consoleBody');
        var empty = getConsoleEl('consoleEmpty');
        if (!body || !empty) return;
        var filtered = consoleFilter === 'all' ? consoleLogs : consoleLogs.filter(function(l) { return l.type === consoleFilter; });
        if (filtered.length === 0) {
            empty.style.display = 'flex';
            body.innerHTML = '';
            body.appendChild(empty);
            return;
        }
        empty.style.display = 'none';
        body.innerHTML = filtered.map(function(l) {
            var icons = {error:'error',warn:'warning',info:'info',debug:'bug_report',network:'language'};
            var icon = icons[l.type] || 'notes';
            return '<div class="log-entry ' + l.type + '">' +
                '<span class="log-icon material-symbols-outlined">' + icon + '</span>' +
                '<span class="log-content">' + escapeHtml(l.message) + '</span>' +
                '<span class="log-time">' + l.time.toLocaleTimeString('en-US',{hour12:false}) + '</span>' +
                '<span class="log-type">' + l.type + '</span>' +
            '</div>';
        }).join('');
    }

    function filterConsoleLogs(filter) {
        consoleFilter = filter;
        var tabs = document.querySelectorAll('.console-tab');
        for (var i = 0; i < tabs.length; i++) {
            tabs[i].classList.toggle('active', tabs[i].dataset.filter === filter);
        }
        renderLogs();
    }

    function clearConsoleLogs() {
        consoleLogs.length = 0;
        renderLogs();
    }

    function handleConsoleInput(e) {
        if (e.key === 'Enter') {
            var input = getConsoleEl('consoleInput');
            if (!input) return;
            var cmd = input.value.trim();
            if (!cmd) return;
            addLog('> ' + cmd, 'debug');
            if (cmd === 'clear') clearConsoleLogs();
            else if (cmd === 'help') addLog('Commands: clear, help, logs, errors, echo', 'info');
            else if (cmd === 'logs') addLog('Total logs: ' + consoleLogs.length, 'info');
            else if (cmd === 'errors') {
                var errCount = 0;
                for (var i = 0; i < consoleLogs.length; i++) {
                    if (consoleLogs[i].type === 'error') errCount++;
                }
                addLog('Total errors: ' + errCount, 'info');
            }
            else if (cmd.startsWith('echo ')) addLog(cmd.substring(5), 'info');
            else addLog('Unknown command. Type "help".', 'warn');
            input.value = '';
        }
    }

    document.addEventListener('keydown', function(e) {
        if ((e.key === '`' || e.key === '~') && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
            e.preventDefault();
            toggleConsole();
        }
        if (e.key === 'Escape' && consoleOpen) toggleConsole();
    });

    var _origLog = console.log;
    var _origError = console.error;
    var _origWarn = console.warn;
    var _origInfo = console.info;
    var _origDebug = console.debug;

    console.log = function() { addLog(Array.from(arguments).join(' '), 'info'); _origLog.apply(console, arguments); };
    console.error = function() { addLog(Array.from(arguments).join(' '), 'error'); _origError.apply(console, arguments); };
    console.warn = function() { addLog(Array.from(arguments).join(' '), 'warn'); _origWarn.apply(console, arguments); };
    console.info = function() { addLog(Array.from(arguments).join(' '), 'info'); _origInfo.apply(console, arguments); };
    console.debug = function() { addLog(Array.from(arguments).join(' '), 'debug'); _origDebug.apply(console, arguments); };

    window.onerror = function(msg, url, line, col) {
        addLog('Error: ' + msg + ' (' + url + ':' + line + ':' + col + ')', 'error');
        return false;
    };
    window.onunhandledrejection = function(e) {
        addLog('Unhandled Rejection: ' + e.reason, 'error');
    };

    addLog('Console ready. Press ~ to open.', 'info');
</script>

<div id="gameOverlay">
   <div id="gameOverlayToolbar">
      <span class="game-title" id="gameTitle">Loading...</span>
      <div style="display:flex;gap:0.5rem">
         <button onclick="toggleConsole()"><span class="material-symbols-outlined" style="font-size:14px">terminal</span> Console</button>
         <button onclick="closeGame()"><span class="material-symbols-outlined" style="font-size:14px">close</span> Exit</button>
      </div>
   </div>
   <iframe id="gameFrame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
</div>

<div id="consoleOverlay" onclick="toggleConsole()"></div>
<div id="consolePanel">
   <div class="console-header">
      <div class="console-title">
         <span class="material-symbols-outlined" style="font-size:16px">terminal</span>
         Console
      </div>
      <span class="console-hint">~ to close</span>
   </div>
   <div class="console-tabs">
      <button class="console-tab active" data-filter="all" onclick="filterConsoleLogs('all')">All</button>
      <button class="console-tab" data-filter="error" onclick="filterConsoleLogs('error')">Errors</button>
      <button class="console-tab" data-filter="warn" onclick="filterConsoleLogs('warn')">Warnings</button>
      <button class="console-tab" data-filter="info" onclick="filterConsoleLogs('info')">Info</button>
      <button class="console-tab" data-filter="network" onclick="filterConsoleLogs('network')">Network</button>
   </div>
   <div class="console-body" id="consoleBody">
      <div class="console-empty" id="consoleEmpty">Logs appear here. Press ~ to toggle.</div>
   </div>
   <div class="console-footer">
      <input type="text" id="consoleInput" placeholder="Command..." onkeydown="handleConsoleInput(event)">
      <button class="console-clear-btn" onclick="clearConsoleLogs()">Clear</button>
   </div>
</div>

</body>
</html>
